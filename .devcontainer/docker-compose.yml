services:
  opus:
    build:
      args:
        USERNAME: "${USER}"
      context: .
      dockerfile: Dockerfile
    deploy:
      resources:
        limits:
          cpus: "6"
          memory: 6g
    extra_hosts:
      - "host.docker.internal:host-gateway"
    hostname: opus
    ipc: host
    network_mode: host
    shm_size: 1g
    volumes:
      - ..:/workspace/opus:cached
      - ${HOME}/.bash_history:/home/${USER}/.bash_history:cached
      - ${HOME}/.claude:/home/${USER}/.claude:cached
      - ${HOME}/.claude.json:/home/${USER}/.claude.json:cached
      - ${HOME}/.config/gh:/home/${USER}/.config/gh:cached

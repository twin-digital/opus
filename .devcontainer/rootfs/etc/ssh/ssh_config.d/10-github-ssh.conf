# GitHub-over-SSH policy for this container. We authenticate GitHub over HTTPS + a KMS-minted App
# token, never SSH — so SSH to GitHub is OPT-IN, keeping the forwarded yubikey/SK agent from being
# used behind your back (e.g. by Claude's startup probe, or an agent).
#
# Default github.com: NO agent. Claude Code runs `ssh -T git@github.com` at session start to probe
# connectivity; with the agent attached, that signs an auth challenge -> a FIDO/yubikey prompt every
# session. Detaching the agent makes the probe find no key and fail harmlessly — no touch.
Host github.com
    IdentityAgent none

# Escape hatch: `git@github-ssh:owner/repo.git` reaches github.com WITH the forwarded agent — for the
# occasional push outside opus (e.g. your dotfiles), or to bypass the App-token flow during soak.
# Explicit use, so a yubikey touch then is expected. Use the git@ form; it pins the SSH user to git.
Host github-ssh
    HostName github.com
    User git

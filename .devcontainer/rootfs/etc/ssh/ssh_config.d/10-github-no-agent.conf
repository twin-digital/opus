# Claude Code runs `ssh -T -o BatchMode=yes git@github.com` at session start to probe GitHub SSH
# connectivity. With the forwarded SSH agent holding yubikey (FIDO/SK) keys and a permissive
# `Host *` user config, that probe makes the agent sign the auth challenge — a Windows FIDO
# presence prompt (yubikey touch) on every session start.
#
# We authenticate GitHub over HTTPS + a KMS-minted App token, never SSH, so detach the agent for
# github.com: the probe finds no key and quietly fails (harmless), and the yubikey is never touched.
#
# NB: this also means manual `ssh git@github.com` won't use the forwarded keys — intentional; this
# container talks to GitHub over HTTPS.
Host github.com
    IdentityAgent none

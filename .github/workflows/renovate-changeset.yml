name: Renovate Changeset

# Reconciles Renovate's dependency updates with changesets-based versioning.
# Full behavior + hazard analysis: docs/cicd/renovate-integration.md.
#
# This is the THIN, untrusted half: it only gates (renovate/* + actor) and delegates the
# privileged work to _renovate-mint-commit.yml pinned @main. The @main pin is load-bearing:
# it makes the reusable job's OIDC job_workflow_ref resolve to that file @refs/heads/main, which
# the AWS minter-role trust requires — so tampering with THIS file on a PR can't redirect the mint.
#
# Trigger is `pull_request`, not `pull_request_target` (§7): renovate/* branches are in-repo, so a
# fork can neither push nor (being denied id-token) mint.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  id-token: write # forwarded to the reusable workflow for OIDC minting
  contents: write

# One run per PR, serialized: cancel-in-progress is false so a write-back run is never SIGTERM'd
# mid-commit (§6.4).
concurrency:
  group: renovate-changeset-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  mint-and-commit:
    # Renovate's in-repo PRs only. The actor gate is also enforced in the AWS trust policy (§7).
    if: ${{ startsWith(github.head_ref, 'renovate/') && github.actor == 'renovate[bot]' }}
    uses: twin-digital/opus/.github/workflows/_renovate-mint-commit.yml@main
    permissions:
      id-token: write
      contents: write
    secrets:
      minter_role_arn: ${{ secrets.GH_APP_MINTER_ROLE_ARN_RENOVATE }}
    with:
      pr_number: ${{ github.event.pull_request.number }}
      base_ref: ${{ github.event.pull_request.base.ref }}
      head_ref: ${{ github.head_ref }}
      pr_title: ${{ github.event.pull_request.title }}

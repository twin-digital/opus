name: Renovate Changeset

# Reconciles Renovate's dependency updates with changesets-based versioning.
# Full behavior + hazard analysis: docs/cicd/renovate-integration.md.
#
# Trigger choice (spec §7): we use `pull_request`, NOT `pull_request_target`.
# Renovate's `renovate/*` branches are in-repo (not forks), so `pull_request`
# already grants a writable GITHUB_TOKEN — we get push access without the
# `pull_request_target` privileged-execution attack surface. The tool only reads
# package.json / pnpm-workspace.yaml as data; it never executes PR code.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

# One run per PR, serialized: cancel-in-progress is false so a write-back run is
# never SIGTERM'd mid-push (§6.4).
concurrency:
  group: renovate-changeset-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  changeset:
    # Renovate's in-repo PRs only (actor gate is defense-in-depth, §7).
    if: ${{ startsWith(github.head_ref, 'renovate/') && github.actor == 'renovate[bot]' }}
    runs-on: ubuntu-latest
    steps:
      # The setup composite does NOT check out the repo, so check out first (§5).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      # SHA-pinned pnpm + Node (from .nvmrc) + `pnpm install` (provides tsx + yaml).
      - name: Setup dependencies
        uses: ./.github/actions/setup

      - name: Generate managed changeset
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Ensure origin/BASE resolves for `git show origin/BASE:<path>` (§5).
          git fetch origin "$BASE_REF"
          pnpm --filter @twin-digital/renovate-tools exec tsx src/cli.ts

      - name: Commit signed managed changeset via GitHub API (§6.4)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          # An API commit's author/committer is the token identity. With GITHUB_TOKEN that is this
          # bot; it MUST equal renovate.json's gitIgnoredAuthors or Renovate treats the PR as
          # user-edited and stops updating it (§6.2). We assert it below rather than trust it.
          EXPECTED_AUTHOR_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"
        run: |
          set -euo pipefail
          managed=".changeset/renovate-${PR_NUMBER}.md"

          # Commit the managed file through the GraphQL API. Commits created via the API are signed
          # by GitHub ("Verified"), satisfying the branch-protection "require signed commits" rule
          # that a local `git commit` (unsigned) would fail. `expectedHeadOid` gives optimistic
          # concurrency: if Renovate force-pushed since checkout, the stale OID fails the mutation
          # and we re-sync + regenerate (§6.4). GITHUB_TOKEN commits never retrigger workflows (§6.6).
          commit_via_api() {
            local oid contents
            oid=$(git rev-parse HEAD)
            contents=$(base64 -w0 "$managed")
            gh api graphql \
              -f query='mutation($repo:String!,$branch:String!,$oid:GitObjectID!,$path:String!,$contents:Base64String!,$msg:String!){
                createCommitOnBranch(input:{
                  branch:{repositoryNameWithOwner:$repo, branchName:$branch},
                  expectedHeadOid:$oid,
                  message:{headline:$msg},
                  fileChanges:{additions:[{path:$path, contents:$contents}]}
                }){ commit { oid author { email } } }
              }' \
              -f repo="$REPO" -f branch="$HEAD_REF" -f oid="$oid" \
              -f path="$managed" -f contents="$contents" \
              -f msg="chore: update changeset for dependency update" \
              --jq '.data.createCommitOnBranch.commit.author.email'
          }

          for attempt in 1 2 3; do
            # Only our managed file is ever committed — human changesets are never touched (§6.5).
            # Unchanged vs the current tip → idempotent no-op (§6.6).
            if [[ -z "$(git status --porcelain "$managed")" ]]; then
              echo "Managed changeset unchanged; nothing to commit (idempotent — §6.6)."
              exit 0
            fi

            if author=$(commit_via_api); then
              if [[ "$author" != "$EXPECTED_AUTHOR_EMAIL" ]]; then
                echo "::warning::commit author '$author' != gitIgnoredAuthors '$EXPECTED_AUTHOR_EMAIL'; Renovate may now treat this PR as user-edited and stop updating it (§6.2)."
              fi
              echo "Committed signed changeset as ${author}."
              exit 0
            fi

            echo "createCommitOnBranch failed (attempt ${attempt}/3) — likely a stale tip; re-syncing and regenerating (§6.4)…"
            git fetch origin "$HEAD_REF" "$BASE_REF"
            git reset --hard "origin/${HEAD_REF}"
            pnpm --filter @twin-digital/renovate-tools exec tsx src/cli.ts
          done
          echo "Exhausted retries; a later Renovate synchronize will regenerate."
          exit 1

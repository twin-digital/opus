name: Renovate Changeset

# Renovate doesn't create changesets, but this repo versions/publishes via
# changesets. For Renovate PRs that bump a publishable package's runtime
# dependency closure, auto-add a `patch` changeset so the update actually ships
# in the next release. devDependency/tooling bumps produce no changeset.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  add-changeset:
    if: ${{ startsWith(github.head_ref, 'renovate/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Generate changeset for dependency update
        # Node 24 (.nvmrc = lts/krypton) runs TypeScript directly via native type-stripping.
        run: node .github/scripts/renovate-changeset.ts
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}

      - name: Commit changeset if one was created
        run: |
          if [[ -n "$(git status --porcelain .changeset)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .changeset
            git commit -m "chore: add changeset for dependency update"
            # Pushing with GITHUB_TOKEN intentionally does NOT retrigger workflows,
            # so this cannot loop on its own synchronize event.
            git push origin "HEAD:${{ github.head_ref }}"
          else
            echo "No changeset needed for this update."
          fi

name: Merge Checks

on:
  # pull‐request events *against* main, for the "merge-commit" build
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

env:
  CI: 1
  HUSKY: 0
  TURBO_TELEMETRY_DISABLED: 1
  # Block dependency install scripts (pnpm `onlyBuiltDependencies`). This job runs sync/lint/typecheck
  # and needs none of the native builds those scripts produce, and holds no deploy creds. See ci.yaml.
  NPM_CONFIG_IGNORE_SCRIPTS: 'true'

jobs:
  merge-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # checkout project
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # setup tools and install dependencies
      - name: Setup dependencies
        uses: ./.github/actions/setup

      # `update-readme` and `sync` run repo-kit directly from source (node strips the TypeScript), so no build or
      # bin link is needed here — and the gate can never evaluate a stale `dist`.
      - name: Fail if README out of date
        run: |
          pnpm run update-readme
          if ! git diff --quiet README.md; then
            echo "README.md is out of date. Run \`pnpm update-readme\` and commit the changes."
            exit 1
          fi

      - name: Fail if project configuration is out of sync
        run: |
          pnpm run sync
          changed=$(git -c core.fileMode=false status --porcelain) || true
          if [[ -n "$changed" ]]; then
            echo "The following files are out of date:"
            echo "$changed"
            echo "Run \`pnpm sync\` and commit the changes."
            exit 1
          fi

      # Per-package `pnpm lint` only runs Prettier within each package dir, so root/non-package files
      # (root README/package.json, renovate.json, CLAUDE.md, docs/) are never checked there. Gate them here.
      - name: Fail if files are not Prettier-formatted
        run: pnpm run format:check

  # Gate Renovate auto-merge: a renovate/* PR must carry its managed changeset before it can merge.
  # Fails on Renovate's own commit; passes once the renovate-changeset automation commits it (that
  # App-token commit re-triggers this workflow). Make this a REQUIRED check so native auto-merge
  # waits for it.
  #
  # The job runs on EVERY PR and no-ops to success on non-Renovate PRs (rather than being `if:`-skipped)
  # so that, as a required check, it always reports a completed success/failure conclusion — never an
  # absent/skipped run that some branch-protection configs leave pending.
  renovate-changeset-present:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
      - name: Require the managed changeset on Renovate PRs
        env:
          HEAD_REF: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          case "$HEAD_REF" in
            renovate/*) ;;
            *) echo "Not a Renovate PR (${HEAD_REF}); nothing to gate."; exit 0 ;;
          esac
          f=".changeset/renovate-${PR_NUMBER}.md"
          if [[ ! -f "$f" ]]; then
            echo "::error::Missing ${f}. The renovate-changeset automation hasn't committed it yet (or failed); auto-merge is blocked until it lands."
            exit 1
          fi
          echo "Found ${f}."

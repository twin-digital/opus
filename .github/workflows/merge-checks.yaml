name: Merge Checks

on:
  # pull‐request events *against* main, for the "merge-commit" build
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

env:
  CI: 1
  HUSKY: 0
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  merge-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # checkout project
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # setup tools and install dependencies
      - name: Setup dependencies
        uses: ./.github/actions/setup

      - name: Build repo-kit
        run: pnpm build --filter @twin-digital/repo-kit
      - name: Create repo-kit .bin link
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Fail if README out of date
        run: |
          pnpm run update-readme
          if ! git diff --quiet README.md; then
            echo "README.md is out of date. Run \`pnpm update-readme\` and commit the changes."
            exit 1
          fi

      - name: Fail if project configuration is out of sync
        run: |
          pnpm run sync
          changed=$(git -c core.fileMode=false status --porcelain) || true
          if [[ -n "$changed" ]]; then
            echo "The following files are out of date:"
            echo "$changed"
            echo "Run \`pnpm sync\` and commit the changes."
            exit 1
          fi

  # Gate Renovate auto-merge: a renovate/* PR must carry its managed changeset before it can merge.
  # Red on Renovate's own commit; green once the renovate-changeset automation commits it (that
  # App-token commit re-triggers this workflow). Make this a REQUIRED check so native auto-merge
  # waits for it. Skipped on non-Renovate PRs (a skipped required check is treated as passing).
  renovate-changeset-present:
    if: ${{ startsWith(github.head_ref, 'renovate/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.head_ref }}
      - name: Require the managed changeset
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          f=".changeset/renovate-${PR_NUMBER}.md"
          if [[ ! -f "$f" ]]; then
            echo "::error::Missing ${f}. The renovate-changeset automation hasn't committed it yet (or failed); auto-merge is blocked until it lands."
            exit 1
          fi
          echo "Found ${f}."

name: 'Copilot Setup Steps'

# Automatically run the setup steps when they are changed to allow for easy validation, and
# allow manual testing through the repository's "Actions" tab
on:
  workflow_dispatch:
  push:
    # `paths` filtering only applies to branch pushes — without a `branches` filter, every
    # TAG push also matches, and a changesets release pushes one tag per versioned package
    # (~17 spurious runs per release). Restricting to branch refs keeps the intended
    # "validate when this file changes" behavior and nothing else.
    branches: ['**']
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    # Set the permissions to the lowest permissions possible needed for your steps.
    # Copilot will be given its own token for its operations.
    permissions:
      # If you want to clone the repository as part of your setup steps, for example to install dependencies, you'll
      # need the `contents: read` permission. If you don't clone the repository in your setup steps, Copilot will do
      # this for you automatically after the steps complete.
      contents: read

    # You can define any steps you want, and they will run before the agent starts.
    # If you do not check out your code, Copilot will do this for you.
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # setup tools and install dependencies. repo-kit's bin runs from source (it needs no build), so the
      # install above is all the setup the agent needs to run `pnpm sync` / `pnpm update-readme`.
      - name: Setup dependencies
        uses: ./.github/actions/setup

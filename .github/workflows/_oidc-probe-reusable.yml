name: OIDC Claims Probe (reusable)

# Throwaway: called by oidc-claims-probe.yml to observe job_workflow_ref for a
# reusable (workflow_call) job. Delete once the OIDC trust scoping is settled.

on:
  workflow_call: {}

permissions:
  id-token: write
  contents: read

jobs:
  print:
    runs-on: ubuntu-latest
    steps:
      - name: Decode OIDC claims (reusable workflow_call job)
        run: |
          set -euo pipefail
          jwt=$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com" | jq -r '.value')
          echo "::add-mask::${jwt}"   # the raw JWT is a short-lived credential — never print it
          p=$(printf '%s' "$jwt" | cut -d. -f2)
          case $(( ${#p} % 4 )) in 2) p="${p}==";; 3) p="${p}=";; esac
          # Only the decoded payload (non-secret claims) is printed.
          printf '%s' "$p" | tr '_-' '/+' | base64 -d \
            | jq '{event:.event_name, sub, actor, actor_id, workflow, workflow_ref, job_workflow_ref, ref, head_ref, base_ref, repository}'

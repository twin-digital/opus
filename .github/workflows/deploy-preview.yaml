name: Deploy Preview

# Default (workflow-level) token is read-only (+ actions:read so the gate can look up CI status on the
# label path). id-token:write (OIDC) is granted ONLY to the deploy job, so the gate that decides
# whether to deploy never holds deploy credentials.
permissions:
  contents: read
  pull-requests: read
  actions: read

on:
  # Two entry points so the `preview` label works in EITHER order:
  #  - workflow_run: CI finished — deploy if the PR is already labeled.
  #  - pull_request labeled: the label was just added — deploy if CI already passed for the head commit.
  # Whichever fires, the gate converges on the same decision; concurrency de-dupes.
  workflow_run:
    types: [completed]
    workflows: ['CI/CD']
  pull_request:
    types: [labeled]
    branches: [main]

# Serialize per source PR (across both triggers) and supersede older runs: a newer push cancels the
# previous (possibly still waiting-for-approval) preview run, so stale runs don't pile up. Tradeoff: a
# new push can cancel an in-flight serverless deploy — acceptable for an ephemeral preview.
# The key includes the head repository, not just the branch: fork branch names collide (e.g. `main`,
# `patch-1`), so keying on branch alone would let one fork's preview cancel another's.
concurrency:
  group: >-
    deploy-preview-${{ github.event.workflow_run.head_repository.full_name || github.event.pull_request.head.repo.full_name }}-${{ github.event.workflow_run.head_branch || github.event.pull_request.head.ref }}
  cancel-in-progress: true

env:
  CI: 1
  HUSKY: 0
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  # Cheap, credential-free decision: preview deploys are OPT-IN via the `preview` label. Because this
  # job has no `environment:`, an un-opted-in PR never enters the `preview` environment — so it never
  # queues an approval and never reaches the deploy credentials.
  gate:
    if: >-
      ${{
        (github.event_name == 'workflow_run' &&
         github.event.workflow_run.conclusion == 'success' &&
         github.event.workflow_run.event == 'pull_request' &&
         github.event.workflow_run.head_branch != 'changeset-release/main') ||
        (github.event_name == 'pull_request' &&
         github.event.label.name == 'preview' &&
         github.event.pull_request.head.repo.full_name == github.repository &&
         github.event.pull_request.head.ref != 'changeset-release/main')
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_deploy: ${{ steps.decide.outputs.should_deploy }}
      stage: ${{ steps.decide.outputs.stage }}
      sha: ${{ steps.decide.outputs.sha }}
      pr: ${{ steps.decide.outputs.pr }}
    steps:
      - name: Decide whether to deploy a preview
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          # workflow_run path
          WR_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          # pull_request (labeled) path (the label name itself is matched in the job `if:`)
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          skip() { echo "$1"; echo "should_deploy=false" >> "$GITHUB_OUTPUT"; exit 0; }

          if [[ "$EVENT" == "workflow_run" ]]; then
            # CI just finished (the job `if:` already required success + pull_request). Deploy iff the
            # source PR is labeled `preview`.
            sha="$WR_HEAD_SHA"
            pr=$(gh api "repos/${REPO}/commits/${sha}/pulls" \
              --jq '[.[] | select(.state == "open" and .base.ref == "main")][0]')
            # `[…][0]` yields `null` when nothing matches; guard before parsing so a null/empty result
            # skips cleanly instead of erroring `jq` on empty input.
            [[ -z "$pr" || "$pr" == "null" ]] && skip "No open PR against main for ${sha}; skipping."
            num=$(printf '%s' "$pr" | jq -r '.number')
            [[ "$(printf '%s' "$pr" | jq -r 'any(.labels[]?; .name == "preview")')" == "true" ]] \
              || skip "PR #$num is not labeled 'preview'; skipping (add the label to opt in)."
          else
            # The `preview` label was just added. The label event carries no CI status, so query whether
            # CI already concluded successfully for this commit — closing the "label after CI" race.
            num="$PR_NUMBER"
            sha="$PR_HEAD_SHA"
            # Select the run by its workflow display NAME ('CI/CD') — the same identifier the workflow_run
            # trigger keys on (workflows: ['CI/CD']) — rather than the ci.yaml filename, so the two paths
            # can't diverge if the file is renamed. Takes the most recent COMPLETED run: if a re-run is
            # in flight over an older green run, it deploys the older green result (fine for a preview).
            concl=$(gh api "repos/${REPO}/actions/runs?head_sha=${sha}&event=pull_request" \
              --jq '[.workflow_runs[] | select(.name == "CI/CD" and .status == "completed")][0].conclusion // empty')
            [[ "$concl" == "success" ]] \
              || skip "CI for ${sha} is '${concl:-not finished}'; the workflow_run path will deploy once it's green."
          fi

          # slugify (keeps only simple characters)
          slug=$(echo "pr-$num" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9_-]+/-/g' \
            | sed -E 's/^-+|-+$//g')

          echo "PR #$num is labeled 'preview' and CI is green → deploying stage: $slug"
          echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          echo "stage=$slug" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "pr=$num" >> "$GITHUB_OUTPUT"

  preview:
    needs: gate
    if: ${{ needs.gate.outputs.should_deploy == 'true' }}
    # Serialize this stage's deploy against its teardown. destroy-preview.yml uses the SAME PR-keyed
    # group, so a close that fires mid-deploy queues the `serverless remove` behind this `serverless
    # deploy` (`cancel-in-progress: false`) instead of racing it — which could orphan the stack or
    # wedge CloudFormation in DELETE_FAILED. This is separate from the workflow-level concurrency
    # (which supersedes stale runs on a new push, keyed on branch).
    concurrency:
      group: preview-stage-pr-${{ needs.gate.outputs.pr }}
      cancel-in-progress: false
    environment: preview
    permissions:
      # OIDC for the AWS role lives only here, on the gated deploy.
      id-token: write
      contents: read
      # Add the sticky `preview-deployed` label below (the teardown signal). On the workflow_run path
      # this token belongs to the base repo, so it can label fork PRs too.
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      # checkout the exact commit CI validated (resolved by the gate, for either trigger)
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.gate.outputs.sha }}

      # setup tools and install dependencies
      - name: Setup dependencies
        uses: ./.github/actions/setup

      # Guard against deploying a stage for an ALREADY-CLOSED PR. Between the gate's decision and this
      # step (a window that widens if the `preview` environment ever requires approval) the PR can be
      # closed — its teardown event has already fired, so a stage created now would have no close event
      # left to clean it up (an orphan). Re-check the PR state here and skip the deploy if it isn't open.
      # This is orthogonal to the `preview-deployed` label, which handles the normal "closed AFTER
      # deploy" case; this handles "closed BEFORE we deploy".
      - name: Skip deploy if PR is already closed
        id: pr_state
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ needs.gate.outputs.pr }}
        run: |
          set -euo pipefail
          state=$(gh api "repos/${REPO}/pulls/${PR}" --jq '.state')
          if [[ "$state" != "open" ]]; then
            echo "PR #${PR} is '${state}', not open — skipping deploy to avoid an orphaned stage."
            echo "open=false" >> "$GITHUB_OUTPUT"
          else
            echo "open=true" >> "$GITHUB_OUTPUT"
          fi

      # Record that a stage is being deployed for this PR BEFORE deploying, via the sticky
      # `preview-deployed` label — the signal destroy-preview.yml reads off the close event payload to
      # decide whether a teardown may be needed. It runs only once the PR is confirmed still open (so a
      # PR closed before we deploy is never labeled for a stage that won't exist) but still BEFORE the
      # Deploy step, so a partially-failed deploy is still torn down. destroy-preview.yml removes the
      # label after a successful teardown; strip-preview-label.yml only ever touches `preview`. The label
      # is keyed on the PR number (like the `pr-<number>` stage), so teardown is immune to branch
      # reuse/rename. Required (no `|| true`): if labeling fails we must NOT deploy, or we'd create a
      # stage with no teardown signal — a leak.
      - name: Mark PR as preview-deployed
        if: ${{ steps.pr_state.outputs.open == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ needs.gate.outputs.pr }}
        run: |
          set -euo pipefail
          gh api -X POST "repos/${REPO}/issues/${PR}/labels" \
            -f 'labels[]=preview-deployed' >/dev/null
          echo "Labeled PR #${PR} 'preview-deployed' (sticky teardown signal)."

      # authenticate with AWS & deploy
      - name: Deploy
        if: ${{ steps.pr_state.outputs.open == 'true' }}
        uses: ./.github/actions/deploy
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-arn: ${{ secrets.AWS_ROLE_ARN }}
          serverless-access-key: ${{ secrets.SERVERLESS_ACCESS_KEY }}
          stage: ${{ needs.gate.outputs.stage }}

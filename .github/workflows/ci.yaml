name: CI

on:
  # every git push (to any branch, including slash-named branches)
  push:
    branches: ['**']
  # pull‐request events *against* main, for the "merge-commit" build
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

# Cancel superseded runs for the same ref (a newer push obsoletes an in-flight run)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: 1
  HUSKY: 0
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # checkout project
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # setup tools and install dependencies
      - name: Setup dependencies
        uses: ./.github/actions/setup

      # Guard: named pnpm catalogs break the Renovate changeset automation.
      # See docs/cicd/renovate-integration.md §8.
      - name: Assert no named pnpm catalogs
        run: node .github/scripts/assert-no-named-catalogs.ts

      # run CI tasks (lint also runs the sherif dependency check via turbo's //#lint:deps task)
      - run: pnpm run build
      - run: pnpm run lint
      - run: pnpm run test

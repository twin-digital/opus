name: CI

on:
  # every git push (to any branch, including slash-named branches)
  push:
    branches: ['**']
  # pull‐request events *against* main, for the "merge-commit" build
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

# Cancel superseded runs for the same ref (a newer push obsoletes an in-flight run)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: 1
  HUSKY: 0
  TURBO_TELEMETRY_DISABLED: 1
  # Block dependency install scripts (pnpm `onlyBuiltDependencies`: esbuild/hnswlib-node/serverless).
  # They run arbitrary code, and this job is ungated and holds no deploy creds. The native artifacts
  # those scripts would produce aren't needed for build/lint/test (esbuild + hnswlib ship prebuilt),
  # so we don't run them here; the credentialed deploy jobs, which do need them, keep scripts on.
  NPM_CONFIG_IGNORE_SCRIPTS: "true"

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # checkout project
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # setup tools and install dependencies
      - name: Setup dependencies
        uses: ./.github/actions/setup

      # run CI tasks (lint also runs the sherif dependency check via turbo's //#lint:deps task)
      - run: pnpm run build
      - run: pnpm run lint
      - run: pnpm run test

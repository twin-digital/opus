name: CI

on:
  # post-merge build on main (also drives the publish/deploy `workflow_run` chain)
  push:
    branches: [main]
  # PR "merge-commit" build against main — the single source of the required
  # `lint-build-test` check. Previously CI also ran on `push: ['**']`, so each PR
  # produced TWO `lint-build-test` runs under the same required context (one push,
  # one pull_request) — ambiguous for required-check enforcement. One run per PR now.
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

# Cancel superseded runs for the same ref (a newer push obsoletes an in-flight run)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: 1
  HUSKY: 0
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # checkout project
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # setup tools and install dependencies
      - name: Setup dependencies
        uses: ./.github/actions/setup

      # run CI tasks (lint also runs the sherif dependency check via turbo's //#lint:deps task)
      - run: pnpm run build
      - run: pnpm run lint
      - run: pnpm run test

name: Deploy

# Allow GitHub to mint OIDC tokens for this workflow
permissions:
  id-token: write
  contents: read

on:
  # watch for CI workflow to finish on main
  workflow_run:
    branches: [main]
    types:
      - completed
    workflows: ['CI']

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  CI: 1
  HUSKY: 0
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  production:
    # Only deploy when the triggering CI run succeeded, and only for main.
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.ref == 'refs/heads/main' }}
    environment: production
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      # checkout the exact commit CI validated (not whatever main points at now)
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # setup tools and install dependencies
      - name: Setup dependencies
        uses: ./.github/actions/setup

      # Restore/save turbo's cache, keyed to the CI-validated commit so the `build` that the
      # serverless deploy depends on replays CI's outputs instead of rebuilding. Newest cache is
      # the restore-keys fallback. (`deploy:*` itself is cache:false; only its `build` dep caches.)
      - name: Cache turbo outputs
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ github.event.workflow_run.head_sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      # authenticate with AWS & deploy
      - name: Deploy
        uses: ./.github/actions/deploy
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-arn: ${{ secrets.AWS_ROLE_ARN }}
          serverless-access-key: ${{ secrets.SERVERLESS_ACCESS_KEY }}
          stage: prod

  # Deploys CDK apps via `turbo run deploy:cdk` (runs only for packages that define it — kept out of
  # the serverless deploy above). Assumes the account's CDK OIDC role, which can assume that account's
  # cdk-* bootstrap roles. Today there's one target (lock-link → saas-apps) under one role; when a CDK
  # app needs a different account, split this into per-account jobs (derive them from the deploy:cdk
  # dry-run rather than a hand-maintained list).
  cdk:
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.ref == 'refs/heads/main' }}
    environment: production
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      # checkout the exact commit CI validated (not whatever main points at now)
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup dependencies
        uses: ./.github/actions/setup

      # Restore/save turbo's cache, keyed to the CI-validated commit so the `build` that deploy:cdk
      # depends on replays CI's outputs instead of rebuilding. Newest cache is the restore-keys fallback.
      - name: Cache turbo outputs
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ github.event.workflow_run.head_sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      # OIDC into the account's CDK deploy role, which can assume that account's cdk-* bootstrap roles
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_CDK_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # deploy:cdk runs only for packages that define it; non-interactive for CI
      - name: Deploy CDK apps
        run: pnpm exec turbo run deploy:cdk -- --all --require-approval never

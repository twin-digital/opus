name: Deploy

# Allow GitHub to mint OIDC tokens for this workflow
permissions:
  id-token: write
  contents: read

on:
  # watch for CI workflow to finish on main
  workflow_run:
    branches: [main]
    types:
      - completed
    workflows: ['CI']

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  CI: 1
  HUSKY: 0
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  production:
    # Only deploy when the triggering CI run succeeded, and only for main.
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.ref == 'refs/heads/main' }}
    environment: production
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      # checkout the exact commit CI validated (not whatever main points at now)
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # setup tools and install dependencies
      - name: Setup dependencies
        uses: ./.github/actions/setup

      # authenticate with AWS & deploy
      - name: Deploy
        uses: ./.github/actions/deploy
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-arn: ${{ secrets.AWS_ROLE_ARN }}
          serverless-access-key: ${{ secrets.SERVERLESS_ACCESS_KEY }}
          stage: prod

name: Publish

on:
  # watch for CI workflow to finish
  workflow_run:
    branches: [main]
    types:
      - completed
    workflows: ['CI']

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  CI: 1
  HUSKY: 0
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  publish:
    # Only for a successful CI run of a PUSH to main: the workflow_run
    # `branches` filter matches the triggering run's head branch, which a fork
    # PR can name `main` — the event type is the unspoofable gate.
    if: ${{ github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'success' }}
    # Scopes the NPM_TOKEN secret (the App-minter role ARN is a repo var).
    environment: release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      packages: write
      id-token: write # OIDC, to assume the AWS role that can kms:Sign the App JWT
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
      published: ${{ steps.changesets.outputs.published }}
    steps:
      # Mint a short-lived GitHub App installation token by signing the App JWT with AWS KMS
      # (the App private key never leaves KMS). Replaces the long-lived CHANGESETS_GITHUB_TOKEN PAT;
      # unlike the default GITHUB_TOKEN, its push/PR events trigger downstream workflows (the release
      # chain). Runs before checkout: OIDC + KMS need no working tree.
      #
      # NB: the JWT→KMS→exchange below inlines .devcontainer/scripts/container/gh-app-token (a CI step
      # can't source that container script). Keep the two in sync; if this changes again, take a hard
      # look at consolidating.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ vars.GH_APP_MINTER_ROLE_ARN }}
          # Fall back to us-east-1 (the KMS key's region) if AWS_REGION is unset.
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Mint GitHub App token
        id: app-token
        shell: bash
        env:
          APP_ID: ${{ vars.GH_APP_ID }}
          INSTALLATION_ID: ${{ vars.GH_APP_INSTALLATION_ID }}
          KMS_KEY_ID: ${{ vars.GH_APP_KMS_KEY }}
        run: |
          set -euo pipefail
          b64url() { openssl base64 -A | tr '+/' '-_' | tr -d '='; }
          now=$(date +%s)
          header=$(printf '{"alg":"RS256","typ":"JWT"}' | b64url)
          payload=$(printf '{"iat":%d,"exp":%d,"iss":"%s"}' "$((now - 60))" "$((now + 480))" "$APP_ID" | b64url)
          si="${header}.${payload}"
          msg=$(mktemp); printf '%s' "$si" > "$msg"
          sig=$(aws kms sign --key-id "$KMS_KEY_ID" --message "fileb://$msg" --message-type RAW \
                  --signing-algorithm RSASSA_PKCS1_V1_5_SHA_256 --query Signature --output text \
                | openssl base64 -d -A | b64url)
          echo "::add-mask::$sig"
          rm -f "$msg"
          # The JWT is a short-lived (~8 min) but full-power credential — it can mint installation
          # tokens. Mask it (and the signature) the instant it exists, before any use, so a stray
          # echo, ACTIONS_STEP_DEBUG run, or future edit can't surface it. Header+payload are not
          # secret (App id + timestamps), so masking the assembled JWT is the meaningful guard.
          jwt="${si}.${sig}"
          echo "::add-mask::$jwt"
          resp=$(curl -sS -X POST \
            -H "Authorization: Bearer $jwt" -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/app/installations/${INSTALLATION_ID}/access_tokens" \
            -d '{"repositories":["opus"],"permissions":{"contents":"write","pull_requests":"write"}}' -w $'\n%{http_code}')
          code=${resp##*$'\n'}; json=${resp%$'\n'*}
          # Only ever surface .message — never the whole body (a misparsed success body holds the token).
          [ "$code" = "201" ] || { echo "::error::App token mint failed (HTTP $code): $(printf '%s' "$json" | jq -r '.message // "unknown error"' 2>/dev/null)"; exit 1; }
          token=$(printf '%s' "$json" | jq -r '.token')
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      # checkout project (app token persisted as git creds → changesets' tag pushes trigger workflows)
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # release the exact commit CI validated, not whatever main points at now —
          # keeps the published version, its git tags, and the built images in lockstep
          ref: ${{ github.event.workflow_run.head_sha }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-tags: true

      # setup tools and install dependencies
      - name: Setup dependencies
        uses: ./.github/actions/setup

      # Restore/save turbo's cache, keyed to the CI-validated commit so `publish-packages`'
      # `turbo run build` replays CI's outputs instead of rebuilding before `changeset publish`.
      # Newest cache is the restore-keys fallback.
      - name: Cache turbo outputs
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ github.event.workflow_run.head_sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      # configure git to ignore executable bit on files and remove executable bits from all files
      # (except node_modules) to prevent publishing failures via github-api
      - name: Configure git file mode and remove executable bits
        run: |
          git config core.fileMode false
          find . -type f -not -path "*/node_modules/*" -executable -exec chmod -x {} +
        shell: bash

      # perform changesets release operations
      - name: Create Publish Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          commitMode: github-api
          publish: pnpm publish-packages
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Prepare matrix of Docker packages to build
  docker-matrix:
    needs: publish
    # Run on a release (publish succeeded, hasChangesets=false) AND when publish FAILED — an
    # npm-publish failure of unrelated packages shouldn't block image builds, which are gated
    # on their own tag detection below (docker-packages.js only emits packages tagged at HEAD).
    # Skips the "create Version Packages PR" runs (publish success + hasChangesets=true).
    if: ${{ !cancelled() && github.event.workflow_run.event == 'push' && (needs.publish.result == 'failure' || needs.publish.outputs.hasChangesets == 'false') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read # default GITHUB_TOKEN is enough here — this job only reads tags
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
      has-packages: ${{ steps.detect.outputs.has-packages }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # read the tags the publish job just pushed; head_sha keeps it in lockstep
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-tags: true

      - name: Setup dependencies
        uses: ./.github/actions/setup

      - name: Detect Docker packages
        id: detect
        run: |
          packages=$(node ./tooling/scripts/bin/docker-packages.js)
          echo "packages=$packages" >> $GITHUB_OUTPUT
          if [ "$packages" = "[]" ]; then
            echo "has-packages=false" >> $GITHUB_OUTPUT
          else
            echo "has-packages=true" >> $GITHUB_OUTPUT
          fi

  # Build and publish Docker images in parallel
  docker-build-publish:
    needs: docker-matrix
    if: needs.docker-matrix.outputs.has-packages == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        package: ${{ fromJson(needs.docker-matrix.outputs.packages) }}
    steps:
      # build images from the exact released commit (matches docker-matrix's tag lookup)
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup dependencies
        uses: ./.github/actions/setup

      # Restore-only: lets `artifact`'s `build` dependency replay CI's outputs. We don't save here —
      # the containerized `.out/**` artifact would bloat the shared turbo cache and evict build entries.
      - name: Restore turbo cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ github.event.workflow_run.head_sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Build Docker image
        run: pnpm run artifact --filter=${{ matrix.package.name }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load, tag, and push Docker image
        run: |
          # Get the image ID from the build artifact
          IMAGE_ID=$(cat ./${{ matrix.package.path }}/.out/image.iid)

          # Load image from artifact
          docker load < ./${{ matrix.package.path }}/.out/container-image.tar.gz

          # Parse version components
          VERSION="${{ matrix.package.version }}"
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f1-2)
          PATCH=$VERSION

          # Tag with all version variants
          docker tag $IMAGE_ID ${{ matrix.package.imageName }}:latest
          docker tag $IMAGE_ID ${{ matrix.package.imageName }}:$PATCH
          docker tag $IMAGE_ID ${{ matrix.package.imageName }}:$MINOR
          docker tag $IMAGE_ID ${{ matrix.package.imageName }}:$MAJOR

          # Push all tags
          docker push ${{ matrix.package.imageName }}:latest
          docker push ${{ matrix.package.imageName }}:$PATCH
          docker push ${{ matrix.package.imageName }}:$MINOR
          docker push ${{ matrix.package.imageName }}:$MAJOR

  # Attach build artifacts to the GitHub releases changesets created. Generic
  # sweep, structurally identical to the docker-image pipeline: a detect job
  # emits a matrix of released packages exposing a `release-assets` script
  # (the well-known hook, wired in by repo-kit — e.g. behavior packs produce
  # an installable .mcpack), and one job per package runs the hook and uploads
  # everything it writes to .release-assets/ (plus SHA256SUMS) to the
  # package's release.
  release-assets-matrix:
    needs: publish
    # Mirror docker-matrix: run on a release AND when publish failed (tags may
    # still exist); skip the "create Version Packages PR" runs.
    if: ${{ !cancelled() && github.event.workflow_run.event == 'push' && (needs.publish.result == 'failure' || needs.publish.outputs.hasChangesets == 'false') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read # this job only reads tags
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
      has-packages: ${{ steps.detect.outputs.has-packages }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # read the tags the publish job just pushed; head_sha keeps it in lockstep
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-tags: true

      - name: Setup dependencies
        uses: ./.github/actions/setup

      - name: Detect released packages with release assets
        id: detect
        run: |
          packages=$(node ./tooling/scripts/bin/release-asset-packages.js)
          echo "packages=$packages" >> "$GITHUB_OUTPUT"
          if [ "$packages" = "[]" ]; then
            echo "has-packages=false" >> "$GITHUB_OUTPUT"
          else
            echo "has-packages=true" >> "$GITHUB_OUTPUT"
          fi

  release-assets:
    needs: release-assets-matrix
    if: needs.release-assets-matrix.outputs.has-packages == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write # upload release assets
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        package: ${{ fromJson(needs.release-assets-matrix.outputs.packages) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          # the write-capable GITHUB_TOKEN must not be readable by the build
          # and release-assets scripts run below
          persist-credentials: false

      - name: Setup dependencies
        uses: ./.github/actions/setup

      # Restore-only: lets the build replay CI's outputs.
      - name: Restore turbo cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ github.event.workflow_run.head_sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      # Two steps so GH_TOKEN (contents: write) is only in the environment of
      # the upload — not of the package's build and release-assets scripts.
      - name: Build release assets
        env:
          # Passed via the environment, not ${{ }}-spliced into the script:
          # values stay data.
          PKG_NAME: ${{ matrix.package.name }}
        run: |
          pnpm build --filter "$PKG_NAME"
          pnpm --filter "$PKG_NAME" run release-assets

      - name: Attach release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # the tag is a git ref name taken verbatim — env values stay data
          PKG_DIR: ${{ matrix.package.path }}
          PKG_TAG: ${{ matrix.package.tag }}
        run: node ./tooling/scripts/bin/upload-release-assets.js "$PKG_TAG" "$PKG_DIR"

  # Check Docker build status and fail workflow if any builds failed
  docker-status-check:
    needs: [publish, docker-matrix, docker-build-publish]
    if: ${{ !cancelled() && needs.docker-matrix.outputs.has-packages == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check Docker build results
        run: |
          result="${{ needs.docker-build-publish.result }}"
          if [ "$result" = "skipped" ]; then
            echo "Docker build skipped because an upstream job failed"
            exit 1
          elif [ "$result" != "success" ]; then
            echo "Docker build and publish failed"
            exit 1
          fi

packages:
  '@twin-digital/workspace':
    # Dockerfile-only image package (no TS source) — keep only the docker/engines/.nvmrc rules.
    rules:
      clean: false
      eslint: false
      eslint-config-bootstrap: false
      typescript: false
      typescript-dependencies: false
      typescript-scripts-and-dependencies: false
      typescript-with-options: false
  '@twin-digital/eslint-config':
    rules:
      eslint: false
      eslint-config-bootstrap: false
  '@twin-digital/opus-scripts':
    rules:
      clean: false
      eslint: false
      eslint-config-bootstrap: false
      typescript: false
      typescript-dependencies: false
      typescript-scripts-and-dependencies: false
      typescript-with-options: false
  '@twin-digital/tsconfig':
    rules:
      eslint: false
      eslint-config-bootstrap: false
      typescript: false
      typescript-dependencies: false
      typescript-scripts-and-dependencies: false
      typescript-with-options: false

hooks:
  - description: Install dependencies
    path: package.json
    run: pnpm install
  - description: Reformat package.json
    path: package.json
    run: pnpm exec prettier-package-json --write ./package.json
  - description: Reformat renovate.json
    path: renovate.json
    run: pnpm exec prettier --write ./renovate.json

features:
  - name: .nvmrc
    actions:
      - name: Create .nvmrc file
        action: write-file
        options:
          file: .nvmrc
          content: |
            lts/krypton
  - name: bundle
    actions:
      - name: Create tsdown config file
        action: write-file
        conditions:
          - dependency: tsdown
        options:
          file: tsdown.config.ts
          content: |
            import { defineConfig } from 'tsdown'

            export default defineConfig({
              dts: true,
              entry: 'src/**/*.ts',
              fixedExtension: false,
              hash: false,
              inputOptions: {
                resolve: {
                  conditionNames: ['source'],
                },
              },
              noExternal: () => true,
              shims: true,
              unbundle: false,
            })
  - name: clean
    actions:
      - name: Add script
        action: json-merge-patch
        options:
          file: package.json
          patch: |
            scripts:
              clean: clean
            devDependencies:
              '@twin-digital/opus-scripts': workspace:*
  - name: docker
    actions:
      - name: Add 'artifact' script to build containers
        action: json-merge-patch
        conditions:
          - exists: Dockerfile
        options:
          file: package.json
          patch: |
            scripts:
              artifact: artifact
            devDependencies:
              '@twin-digital/opus-scripts': workspace:*
      - name: Add 'dev' script to create docker development environment
        action: json-merge-patch
        conditions:
          - exists: docker-compose.yml
        options:
          file: package.json
          patch: |
            scripts:
              dev: docker-dev
            devDependencies:
              '@twin-digital/opus-scripts': workspace:*
  - name: renovate-built-dependencies
    # Keep renovate's build-script PR rule in step with pnpm's `onlyBuiltDependencies`: packages that run install
    # scripts are arbitrary code execution, and the renovate config isolates each into its own non-automerged PR
    # (see the matching packageRule in renovate.json). This copies that package list so the two cannot drift.
    scope: root
    conditions:
      - exists: renovate.json
      - exists: pnpm-workspace.yaml
    actions:
      - name: Sync build-script packages into renovate's matchPackageNames
        action: sync-json-value
        options:
          source:
            file: pnpm-workspace.yaml
            pointer: /onlyBuiltDependencies
            default: []
          target:
            file: renovate.json
            array: /packageRules
            where:
              pointer: /addLabels
              contains: build-scripts
            set: /matchPackageNames
  - name: renovate-patched-dependencies
    # Keep renovate's patched-dependency PR rule in step with pnpm's `patchedDependencies`: a version-pinned patch
    # breaks on any bump (the patch stops applying and the lockfile relock fails), so the renovate config isolates
    # each patched package into its own non-automerged PR (see the matching packageRule in renovate.json) for a human
    # to re-roll or drop the patch. `patchedDependencies` is map-shaped and its keys may carry a version
    # (`pkg@1.2.3`), so take the keys and strip the version to get the package names — keeping the two from drifting.
    scope: root
    conditions:
      - exists: renovate.json
      - exists: pnpm-workspace.yaml
    actions:
      - name: Sync patched-dependency packages into renovate's matchPackageNames
        action: sync-map-to-array
        options:
          source:
            file: pnpm-workspace.yaml
            pointer: /patchedDependencies
            default: {}
          # `patchedDependencies` is a map keyed by selector (`pkg` or `pkg@version`); take the keys and reduce each to
          # its bare package name so the result matches renovate's `matchPackageNames`.
          emit: keys
          transform: strip-package-version
          target:
            file: renovate.json
            array: /packageRules
            where:
              pointer: /addLabels
              contains: patched-deps
            set: /matchPackageNames
  - name: engines
    actions:
      - name: Add engines specification to package.json
        action: json-merge-patch
        options:
          file: package.json
          patch: |
            engines:
              node: 24.x
              pnpm: 10.x
  - name: eslint
    actions:
      - action: write-file
        options:
          file: eslint.config.js
          content: |
            import { existsSync, readdirSync } from 'node:fs'

            import base from '@twin-digital/eslint-config'

            // Project overrides: any 'eslint.config.d/*.js' config fragments (composed in filename
            // order) extend the shared base. repo-kit features and packages drop fragments there
            // instead of editing this file.
            const overridesDir = new URL('./eslint.config.d/', import.meta.url)

            const overrides = []
            if (existsSync(overridesDir)) {
              const files = readdirSync(overridesDir)
                .filter((file) => file.endsWith('.js'))
                .sort()
              for (const file of files) {
                const fragment = await import(new URL(file, overridesDir).href)
                overrides.push(...[fragment.default].flat())
              }
            }

            export default [...base, ...overrides]

      - action: json-merge-patch
        options:
          file: package.json
          patch: |
            scripts:
              lint: lint
              'lint:fix': lint_fix
            devDependencies:
              '@eslint/js': 'catalog:'
              '@twin-digital/eslint-config': workspace:*
              '@twin-digital/opus-scripts': workspace:*
              eslint: 'catalog:'
              eslint-config-prettier: 'catalog:'
              globals: 'catalog:'
              prettier: 'catalog:'
              prettier-package-json: 'catalog:'
              typescript-eslint: 'catalog:'
  - name: serverless
    actions:
      - name: Add serverless scripts and dependencies
        action: json-merge-patch
        conditions:
          - exists: serverless.yml
        options:
          file: package.json
          patch: |
            scripts:
              'deploy:serverless': serverless deploy
              'deploy:dev': serverless deploy --stage dev
              'deploy:prod': serverless deploy --stage prod
              'destroy:serverless': serverless remove
              dev: pnpm exec sls-dev-tools generate | docker-dev -
            devDependencies:
              '@twin-digital/serverless-dev-tools': workspace:*
              serverless: 'catalog:'
  - name: package-manifest
    actions:
      # if project has source files...
      - name: Add files entries
        action: json-patch
        conditions:
          - exists: src/*.ts
        options:
          file: package.json
          patch: |
            - opx: appendIfMissing
              path: /files
              value: dist
            - opx: appendIfMissing
              path: /files
              value: "!dist/**/*.d.ts.map"
      - name: Add default esm export
        action: json-merge-patch
        conditions:
          - exists: src/index.ts
        options:
          file: package.json
          patch: |
            exports:
              .:
                import:
                  source: ./src/index.ts
                  types: ./dist/index.d.ts
                  import: ./dist/index.js
      - name: Forbid direct import of '/index'
        action: json-patch
        conditions:
          - exists: src/index.ts
        options:
          file: package.json
          patch: |
            - op: add
              path: /exports/.~1index
              value: null
            - op: add
              path: /exports/.~1index.js
              value: null
      - name: Add additional esm exports
        action: json-merge-patch
        conditions:
          - exists: src/*.ts
        options:
          file: package.json
          patch: |
            exports:
              ./*:
                import:
                  source: ./src/*.ts
                  types: ./dist/*.d.ts
                  import: ./dist/*.js
      - name: Add default cjs export
        action: json-merge-patch
        conditions:
          - exists: tsconfig.cjs.json
          - exists: src/index.ts
        options:
          file: package.json
          patch: |
            exports:
              .:
                require:
                  types: ./dist/cjs/index.d.ts
                  require: ./dist/cjs/index.js
      - name: Add additional cjs exports
        action: json-merge-patch
        conditions:
          - exists: tsconfig.cjs.json
          - exists: src/*.ts
        options:
          file: package.json
          patch: |
            exports:
              ./*:
                require:
                  types: ./dist/cjs/*.d.ts
                  require: ./dist/cjs/*.js
      - name: Remove unnecessary cjs exports
        action: json-merge-patch
        conditions:
          - notExists: tsconfig.cjs.json
        options:
          file: package.json
          patch: |
            exports:
              .:
                require: null
              ./*:
                require: null
      # if project does not have source files...
      - name: Remove files entries
        action: json-patch
        conditions:
          - notExists: src/*
        options:
          file: package.json
          patch: |
            - opx: removeValue
              path: /files
              value: dist
            - opx: removeValue
              path: /files
              value: '!dist/**/*.d.ts.map'
      - name: Remove exports
        action: json-merge-patch
        conditions:
          - notExists: src/*.ts
        options:
          file: package.json
          patch: |
            exports:
              .: null
              ./*: null
      - name: Reorder export keys
        action: json-patch
        conditions:
          - exists: package.json
        options:
          file: package.json
          patch: |
            - opx: reorderMapKeys
              path: /exports/./import
              value:
                - source
                - types
                - import
            - opx: reorderMapKeys
              path: /exports/.~1*/import
              value:
                - source
                - types
                - import
  - name: test
    actions:
      - name: Add dependencies
        action: json-merge-patch
        conditions:
          - exists: src/**/*.test.ts
        options:
          file: package.json
          patch: |
            devDependencies:
              "@twin-digital/vitest-config": "workspace:*"
              "@vitest/coverage-istanbul": "catalog:"
              vitest: "catalog:"
            scripts:
                test: vitest run
                "test:watch": vitest
      - name: Create vitest config
        action: write-file
        conditions:
          - exists: src/**/*.test.ts
          - notExists: src/**/*.tsx
        options:
          file: vitest.config.ts
          content: |
            import { sharedConfig } from '@twin-digital/vitest-config'

            export default sharedConfig
      - name: Create vitest config (React support)
        action: write-file
        conditions:
          - exists: src/**/*.test.ts
          - exists: src/**/*.tsx
        options:
          file: vitest.config.ts
          content: |
            import { defineConfig, mergeConfig } from 'vitest/config'
            import { sharedConfig } from '@twin-digital/vitest-config'

            export default mergeConfig(
              sharedConfig,
              defineConfig({
                test: {
                  environment: 'jsdom',
                },
              }),
            )
  - name: typescript
    actions:
      - name: Create tsconfig.json file
        action: write-file
        conditions:
          - notExists: tsconfig.options.json
        options:
          file: tsconfig.json
          content: |
            {
              "extends": ["@twin-digital/tsconfig/tsconfig.json"],
              "compilerOptions": {
                "customConditions": ["source"]
              }
            }
      - name: Create tsconfig.build.json file
        action: write-file
        conditions:
          - notExists: tsconfig.options.json
        options:
          file: tsconfig.build.json
          content: |
            {
              "extends": ["@twin-digital/tsconfig/tsconfig.build.json"]
            }
      - name: Create tsconfig.json file with custom options
        action: write-file
        conditions:
          - exists: tsconfig.options.json
        options:
          file: tsconfig.json
          content: |
            {
              "extends": ["@twin-digital/tsconfig/tsconfig.json", "./tsconfig.options.json"],
              "compilerOptions": {
                "customConditions": ["source"]
              }
            }
      - name: Create tsconfig.build.json file with custom options
        action: write-file
        conditions:
          - exists: tsconfig.options.json
        options:
          file: tsconfig.build.json
          content: |
            {
              "extends": ["@twin-digital/tsconfig/tsconfig.build.json", "./tsconfig.options.json"]
            }
      - name: Add scripts and dependencies
        action: json-merge-patch
        options:
          file: package.json
          patch: |
            scripts:
              build: build
              typecheck: tsc --noEmit
            devDependencies:
              '@twin-digital/opus-scripts': workspace:*
              '@twin-digital/tsconfig': workspace:*
              '@types/node': 'catalog:'
              typescript: 'catalog:'
  # CDK applications: keyed on the `aws-cdk` CLI dependency (apps synth/deploy; construct *libraries*
  # depend on aws-cdk-lib/constructs but not the CLI, so they don't match — and must not get the
  # runtime/infra import ban, since their src legitimately imports aws-cdk-lib).
  - name: cdk
    actions:
      - name: Create cdk.json
        action: write-file
        conditions:
          - dependency: aws-cdk
        options:
          file: cdk.json
          content: |
            {
              "app": "pnpm exec tsx infra/app.ts",
              "output": "cdk.out",
              "watch": {
                "include": ["src/**"],
                "exclude": ["**/*.test.ts"]
              }
            }
      - name: Add CDK app scripts
        action: json-merge-patch
        conditions:
          - dependency: aws-cdk
        options:
          file: package.json
          patch: |
            scripts:
              synth: cdk synth
              'deploy:cdk': cdk deploy
              'destroy:cdk': cdk destroy
      - name: Create CDK runtime/infra eslint override fragment
        action: write-file
        conditions:
          - dependency: aws-cdk
        options:
          file: eslint.config.d/50-runtime-infra-ban.js
          content: |
            // Composed onto the shared base by the generated eslint.config.js (eslint.config.d/*.js).
            const infraMessage = 'Runtime code (src/) must not import infrastructure libraries.'

            const srcImportBans = {
              paths: [
                { name: 'aws-cdk-lib', message: infraMessage },
                { name: 'constructs', message: infraMessage },
              ],
              patterns: [
                { group: ['aws-cdk-lib/*'], message: infraMessage },
                {
                  group: ['**/infra/**'],
                  message: 'Runtime code (src/) must not import from infra/ — infra depends on src, never the reverse.',
                },
              ],
            }

            // Enforce the one-directional boundary: infra/ may depend on src/, never the reverse.
            export default [
              // cdk.out holds synthesized templates and the bundled Lambda — generated artifacts, not source.
              { ignores: ['cdk.out'] },
              {
                files: ['src/**/*.ts'],
                rules: { 'no-restricted-imports': ['error', srcImportBans] },
              },
            ]

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Farwatch — ink-style swatches (dynamic)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,500;1,400&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Spectral:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="paper.css" />
    <link rel="stylesheet" href="paper-color.css" />
    <link rel="stylesheet" href="ink.css" />
    <style>
      /* Every INK-STYLE variant (face / slant / weight / size / bleed), rendered on a chosen paper
         style + colour. The header dropdowns swap the paper style and the colour for all cells at once;
         each cell holds a different ink style. */
      :root {
        --serif: "EB Garamond", Georgia, "Times New Roman", serif;
        /* type-role accents are a separate dial — held constant here */
        --s-voice: #4a3a22; --s-meta: #463a22; --s-loss: #7a2f25; --s-gold: #99713a;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      html { font-size: 19px; }
      body { font-family: var(--serif); color: #c8cacc; background: #202124; -webkit-font-smoothing: antialiased; }

      .chrome-bar {
        position: sticky; top: 0; z-index: 5; display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
        padding: 9px 18px; background: #1d1f21; border-bottom: 1px solid #000;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 13px; color: #c7cacc;
      }
      .chrome-bar .brand { font-weight: 600; letter-spacing: 0.02em; color: #e6e8ea; }
      .chrome-bar label { text-transform: uppercase; letter-spacing: 0.07em; font-size: 11px; color: #868a8d; }
      .chrome-bar select { font-family: inherit; font-size: 13px; background: #2c2f31; color: #e6e8ea; border: 1px solid #414547; border-radius: 4px; padding: 5px 9px; }
      .chrome-bar .note { margin-left: auto; color: #6e7274; font-style: italic; }

      .stage { padding: 5vh 4vw 12vh; }
      h1 { font-family: system-ui, sans-serif; font-size: 1rem; font-weight: 600; margin: 0 0 4px; color: #e2e4e6; }
      .sub { font-family: system-ui, sans-serif; margin: 0 0 28px; color: #8a8d90; font-size: 0.85rem; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 28px; max-width: 1240px; }

      .cell .tag { font-family: system-ui, sans-serif; font-size: 0.78rem; letter-spacing: 0.02em; color: #94989b; margin: 0 0 8px; }
      .cell .tag b { color: #d9dcde; font-weight: 600; }

      /* the swatch IS a .paper — style + colour from the grid; the INK style from the cell's .ink-* class */
      .swatch { padding: 28px 30px 26px; line-height: 1.6; border-radius: 1px; }
      .swatch .when { font-variant: small-caps; letter-spacing: 0.1em; font-weight: 500; color: var(--s-meta); font-size: 0.95em; margin: 0 0 16px; }
      .swatch .h { font-size: 1.04em; margin: 0 0 12px; border-bottom: 1.5px solid currentColor; display: inline-block; padding-bottom: 3px; }
      .swatch p { margin: 0 0 11px; }
      .swatch .loss { color: var(--s-loss); }
      .swatch .struck { text-decoration: line-through; text-decoration-color: var(--s-loss); }
      .swatch .ctl { border-bottom: 1px dotted var(--s-gold); }
      .swatch .sig { font-style: italic; color: var(--s-voice); margin: 0; }
    </style>
  </head>
  <body>
    <header class="chrome-bar">
      <span class="brand">Farwatch · ink-style swatches</span>
      <label for="paper-select">paper style</label>
      <select id="paper-select">
        <option value="worn-bright">worn-bright (default)</option>
        <option value="ledger">ledger</option>
        <option value="card">card</option>
        <option value="austere">austere</option>
        <option value="clean">clean</option>
      </select>
      <label for="color-select">colour</label>
      <select id="color-select">
        <option value="warm-posting">warm-posting — parchment · sepia (default)</option>
        <option value="worn-ledger">worn-ledger — ledger · sepia</option>
        <option value="amber-warm">amber-warm — amber · sepia</option>
        <option value="bright-clean">bright-clean — bright · sepia</option>
        <option value="cabinet">cabinet — cream · soot</option>
        <option value="ghostly">ghostly — ledger · faded</option>
      </select>
      <span class="note">chrome — sets the paper style + colour under every ink style</span>
    </header>

    <div class="stage">
      <h1>Ink-style combinations</h1>
      <p class="sub">Each cell is one ink style (face · slant · weight · size · bleed), all on the chosen paper style + colour. Voice / stamp / loss / gold accents are held constant (a separate dial).</p>
      <div class="grid paper-v-worn-bright color-warm-posting" id="grid"></div>
    </div>

    <script>
      (function () {
        const INKS = [
          ['chronicle', 'Garamond · upright · reading · bleed'],
          ['posting', 'Garamond · upright · compact · bleed'],
          ['scribe', 'Garamond · ITALIC · reading · bleed'],
          ['monastic', 'Spectral · upright · compact · no bleed'],
          ['scholar', 'Crimson Pro · upright · compact'],
          ['crisp', 'Garamond · medium · no bleed'],
        ];
        const TEXT =
          '<p class="when">Farwatch · at the turn of the season</p>' +
          '<p class="h">What you sent them to do</p>' +
          '<p>They came to the barrow-door at dusk — <span class="ctl">to the keeping of the lamp</span>.</p>' +
          '<p>The strongbox came home heavier, though <span class="loss">the lien falls due at first snow</span>.</p>' +
          '<p>Mirela came home. <span class="struck">Odric did not.</span></p>' +
          '<p class="sig">— the steward</p>';

        const grid = document.getElementById('grid');
        INKS.forEach(([slug, sub]) => {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.innerHTML =
            '<p class="tag"><b>' + slug + '</b> · ' + sub + '</p>' +
            '<div class="paper swatch ink-' + slug + '">' + TEXT + '</div>';
          grid.appendChild(cell);
        });

        // ── paper-style + colour switchers (chrome) ──
        const gridEl = document.getElementById('grid');
        const styleSel = document.getElementById('paper-select');
        const colorSel = document.getElementById('color-select');
        function applyGlobal() { gridEl.className = 'grid paper-v-' + styleSel.value + ' color-' + colorSel.value; }
        [styleSel, colorSel].forEach((s) => s.addEventListener('change', applyGlobal));
        applyGlobal();
      })();
    </script>
  </body>
</html>

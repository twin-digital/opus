<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Farwatch — ink exploration (family · weight · bleed · size)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Crimson+Pro:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Fraunces:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Newsreader:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Spectral:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="paper.css" />
    <link rel="stylesheet" href="paper-color.css" />
    <link rel="stylesheet" href="ink.css" />
    <style>
      /* Ink exploration: pick a face + weight (dropdowns) on a chosen paper style + colour; each BLEED gets
         its own section, and within a section a row of font SIZES. (Slant removed — no italics for the body.) */
      :root {
        --serif: "EB Garamond", Georgia, "Times New Roman", serif;
        --s-voice: #4a3a22; --s-meta: #463a22; --s-loss: #7a2f25; --s-gold: #99713a; /* fixed accents */
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      html { font-size: 19px; }
      body { font-family: var(--serif); color: #c8cacc; background: #202124; -webkit-font-smoothing: antialiased; }

      .chrome-bar {
        position: sticky; top: 0; z-index: 5; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
        padding: 9px 18px; background: #1d1f21; border-bottom: 1px solid #000;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 13px; color: #c7cacc;
      }
      .chrome-bar .brand { font-weight: 600; letter-spacing: 0.02em; color: #e6e8ea; }
      .chrome-bar label { text-transform: uppercase; letter-spacing: 0.07em; font-size: 11px; color: #868a8d; }
      .chrome-bar select { font-family: inherit; font-size: 13px; background: #2c2f31; color: #e6e8ea; border: 1px solid #414547; border-radius: 4px; padding: 5px 9px; }

      .stage { padding: 5vh 4vw 12vh; }
      h1 { font-family: system-ui, sans-serif; font-size: 1rem; font-weight: 600; margin: 0 0 4px; color: #e2e4e6; }
      .sub { font-family: system-ui, sans-serif; margin: 0 0 28px; color: #8a8d90; font-size: 0.85rem; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 28px; max-width: 1240px; }

      .cell .tag { font-family: system-ui, sans-serif; font-size: 0.78rem; letter-spacing: 0.02em; color: #94989b; margin: 0 0 8px; }
      .cell .tag b { color: #d9dcde; font-weight: 600; }

      .section { font-family: system-ui, sans-serif; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: #7f8487; margin: 34px 0 12px; }
      .ptable { width: 100%; border-collapse: collapse; font-family: system-ui, -apple-system, sans-serif; font-size: 11.5px; margin-top: 10px; }
      .ptable th { text-align: left; font-weight: 500; color: #7f8487; padding: 3px 10px 3px 0; white-space: nowrap; vertical-align: top; }
      .ptable td { text-align: right; color: #cdd0d2; padding: 3px 0; font-variant-numeric: tabular-nums; }
      .ptable tr + tr th, .ptable tr + tr td { border-top: 1px solid #2b2e30; }
      .dials .cell { background: #1a1c1e; border: 1px solid #2b2e30; border-radius: 4px; padding: 12px 14px; }

      .swatch { padding: 26px 28px 24px; line-height: 1.55; border-radius: 1px; }
      .swatch .when { font-variant: small-caps; letter-spacing: 0.1em; font-weight: 500; color: var(--s-meta); font-size: 0.9em; margin: 0 0 14px; }
      .swatch .h { font-size: 1.04em; margin: 0 0 10px; border-bottom: 1.5px solid currentColor; display: inline-block; padding-bottom: 3px; }
      .swatch p { margin: 0 0 9px; }
      .swatch .loss { color: var(--s-loss); }
      .swatch .struck { text-decoration: line-through; text-decoration-color: var(--s-loss); }
      .swatch .ctl { border-bottom: 1px dotted var(--s-gold); }
      .swatch .sig { font-style: italic; color: var(--s-voice); margin: 0; }

      /* a wide reading passage at the bottom — how a real chronicle actually reads at the current settings */
      .reader { max-width: 44rem; padding: 46px 52px 42px; line-height: 1.62; }
      .reader p { margin: 0 0 1em; }
      .reader p.first { margin-top: 0.2em; }
    </style>
  </head>
  <body>
    <header class="chrome-bar">
      <span class="brand">Farwatch · ink exploration</span>
      <label for="paper-select">paper</label>
      <select id="paper-select">
        <option value="worn-bright">worn-bright (default)</option>
        <option value="ledger">ledger</option>
        <option value="card">card</option>
        <option value="austere">austere</option>
        <option value="clean">clean</option>
      </select>
      <label for="color-select">colour</label>
      <select id="color-select">
        <option value="warm-posting">warm-posting (default)</option>
        <option value="worn-ledger">worn-ledger</option>
        <option value="amber-warm">amber-warm</option>
        <option value="bright-clean">bright-clean</option>
        <option value="cabinet">cabinet</option>
        <option value="ghostly">ghostly</option>
      </select>
      <label for="family-select">font family</label>
      <select id="family-select">
        <option value="garamond">EB Garamond (default · no light)</option>
        <option value="cormorant">Cormorant Garamond (→300)</option>
        <option value="newsreader">Newsreader (→200)</option>
        <option value="fraunces">Fraunces (→300)</option>
        <option value="crimson">Crimson Pro (→200)</option>
        <option value="spectral">Spectral (→200)</option>
      </select>
      <label for="weight-select">font weight</label>
      <select id="weight-select">
        <option value="200">200</option>
        <option value="300">300</option>
        <option value="400" selected>400</option>
        <option value="500">500</option>
        <option value="600">600</option>
        <option value="700">700</option>
        <option value="800">800</option>
      </select>
      <label for="bleed-select">ink bleed</label>
      <select id="bleed-select">
        <option value="none">none — blur 0 · α0</option>
        <option value="light">light — blur 0.6px · α0.4</option>
        <option value="full" selected>full — blur 0.7px · α0.5</option>
        <option value="extreme">extreme — blur 1.15px · α0.85</option>
      </select>
    </header>

    <div class="stage">
      <h1>Ink exploration — face · weight · bleed · size</h1>
      <p class="sub">Pick a face + weight + ink-bleed on a chosen paper + colour; the grid shows a range of font sizes at those settings. Voice / stamp / loss / gold accents are held constant (a separate dial).</p>

      <h2 class="section">Active context (paper + colour)</h2>
      <div class="grid dials" id="context"></div>

      <div id="app"></div>
    </div>

    <script>
      (function () {
        const PAPER_STYLES = {
          'worn-bright': { grain: 'fine', laid: 'fibre', glow: 'candle-soft', tear: 'torn' },
          'ledger':      { grain: 'fine', laid: 'fibre', glow: 'candle', tear: 'deep' },
          'card':        { grain: 'fine', laid: 'fibre', glow: 'none', tear: 'torn' },
          'austere':     { grain: 'soft', laid: 'none', glow: 'none', tear: 'none' },
          'clean':       { grain: 'none', laid: 'none', glow: 'none', tear: 'none' },
        };
        const COLORS = {
          'warm-posting': { 'paper colour': 'parchment · #e2d1a3', 'ink': 'sepia · #2c2012', 'bleed hue': '48 22 8' },
          'worn-ledger':  { 'paper colour': 'ledger · #d9cca6', 'ink': 'sepia · #2c2012', 'bleed hue': '48 22 8' },
          'amber-warm':   { 'paper colour': 'amber · #e5d1a0', 'ink': 'sepia · #2c2012', 'bleed hue': '48 22 8' },
          'bright-clean': { 'paper colour': 'bright · #e8d6a4', 'ink': 'sepia · #2c2012', 'bleed hue': '48 22 8' },
          'cabinet':      { 'paper colour': 'cream · #ece6d2', 'ink': 'soot · #201f18', 'bleed hue': '20 20 14' },
          'ghostly':      { 'paper colour': 'ledger · #d9cca6', 'ink': 'faded · #5a4a30', 'bleed hue': '60 44 24' },
        };
        const FAMILY_VAR = { garamond: 'var(--face-garamond)', spectral: 'var(--face-spectral)', crimson: 'var(--face-crimson)', cormorant: 'var(--face-cormorant)', newsreader: 'var(--face-newsreader)', fraunces: 'var(--face-fraunces)' };
        const FAMILY_LABEL = { garamond: 'EB Garamond', spectral: 'Spectral', crimson: 'Crimson Pro', cormorant: 'Cormorant Garamond', newsreader: 'Newsreader', fraunces: 'Fraunces' };
        // each bleed is the default single-shadow mechanism at different blur + alpha (the two tunable knobs)
        const BLEEDS = [
          { name: 'none', blur: '0', alpha: '0' },
          { name: 'light', blur: '0.6px', alpha: '0.4' },
          { name: 'full', blur: '0.7px', alpha: '0.5' },
          { name: 'extreme', blur: '1.15px', alpha: '0.85' },
        ];
        const SIZES = ['0.9rem', '1rem', '1.1rem', '1.2rem', '1.35rem', '1.5rem'];
        // rem → px, using the actual root font-size (html { font-size } below) so every swatch shows its real size
        const ROOT_PX = parseFloat(getComputedStyle(document.documentElement).fontSize) || 19;
        const pxOf = (rem) => (Math.round(parseFloat(rem) * ROOT_PX * 10) / 10) + 'px';

        function table(obj) {
          return '<table class="ptable">' + Object.keys(obj).map((k) => '<tr><th>' + k + '</th><td>' + obj[k] + '</td></tr>').join('') + '</table>';
        }
        const TEXT =
          '<p class="when">Farwatch · at the turn of the season</p>' +
          '<p class="h">What you sent them to do</p>' +
          '<p>They came to the barrow-door at dusk — <span class="ctl">to the keeping of the lamp</span>.</p>' +
          '<p>The strongbox came home heavier, though <span class="loss">the lien falls due at first snow</span>.</p>' +
          '<p>Mirela came home. <span class="struck">Odric did not.</span></p>' +
          '<p class="sig">— the steward</p>';
        // a genuine public-domain passage for fair readability testing — George MacDonald, Phantastes (1858),
        // the acknowledged forerunner of Tolkien & Lewis. Verbatim from Project Gutenberg ebook #325.
        const READER_TEXT =
          '<p class="when">from Phantastes · George MacDonald · 1858</p>' +
          '<p class="h">The Forest of Fairy Land</p>' +
          '<p class="first">The trees, which were far apart where I entered, giving free passage to the level rays of the sun, closed rapidly as I advanced, so that ere long their crowded stems barred the sunlight out, forming as it were a thick grating between me and the East. I seemed to be advancing towards a second midnight.</p>' +
          '<p>In the midst of the intervening twilight, however, before I entered what appeared to be the darkest portion of the forest, I saw a country maiden coming towards me from its very depths. She did not seem to observe me, for she was apparently intent upon a bunch of wild flowers which she carried in her hand.</p>' +
          '<p>I could hardly see her face; for, though she came direct towards me, she never looked up. But when we met, instead of passing, she turned and walked alongside of me for a few yards, still keeping her face downwards, and busied with her flowers.</p>' +
          '<p>She spoke rapidly, however, all the time, in a low tone, as if talking to herself, but evidently addressing the purport of her words to me. She seemed afraid of being observed by some lurking foe.</p>' +
          '<p class="sig">— George MacDonald</p>';

        const app = document.getElementById('app');
        const context = document.getElementById('context');
        const styleSel = document.getElementById('paper-select');
        const colorSel = document.getElementById('color-select');
        const famSel = document.getElementById('family-select');
        const weightSel = document.getElementById('weight-select');
        const bleedSel = document.getElementById('bleed-select');

        function render() {
          const ps = styleSel.value, col = colorSel.value, fam = famSel.value, wt = weightSel.value;
          const b = BLEEDS.find((x) => x.name === bleedSel.value) || BLEEDS[2];
          const bleedDisp = b.name + ' · blur ' + b.blur + ' · α' + b.alpha;
          // paper style + colour set --paper-* on #app; face / weight / bleed set as inline --ink-* (inherited)
          app.className = 'paper-v-' + ps + ' color-' + col;
          app.style.setProperty('--ink-family', FAMILY_VAR[fam]);
          app.style.setProperty('--ink-weight', wt);
          app.style.setProperty('--ink-bloom-blur', b.blur);
          app.style.setProperty('--ink-bloom-alpha', b.alpha);

          context.innerHTML =
            '<div class="cell"><p class="tag">paper style — <b>' + ps + '</b></p>' + table(PAPER_STYLES[ps]) + '</div>' +
            '<div class="cell"><p class="tag">colour — <b>' + col + '</b></p>' + table(COLORS[col]) + '</div>';

          // one section, all font sizes, at the selected bleed
          app.innerHTML =
            '<h2 class="section">Font sizes — ink bleed: ' + bleedDisp + '</h2>' +
            '<div class="grid">' +
            SIZES.map((sz) =>
              '<div class="cell">' +
                '<p class="tag">size <b>' + sz + '</b> · ' + pxOf(sz) + '</p>' +
                '<div class="paper swatch" style="--ink-size:' + sz + '">' + TEXT + '</div>' +
                table({ family: FAMILY_LABEL[fam], weight: wt, size: sz + ' · ' + pxOf(sz), bleed: bleedDisp }) +
              '</div>'
            ).join('') +
            '</div>' +
            '<h2 class="section">Reading sample — reader width · 1.35rem (' + pxOf('1.35rem') + ')</h2>' +
            '<div class="paper swatch reader" style="--ink-size:1.35rem">' + READER_TEXT + '</div>';
        }

        [styleSel, colorSel, famSel, weightSel, bleedSel].forEach((s) => s.addEventListener('change', render));
        render();
      })();
    </script>
  </body>
</html>

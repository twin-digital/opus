# Primary-goal generation. Weights are relative (need not sum to 1). Tune freely.

# Which resource a primary goal seeks — skewed to the quest-worthy kinds.
rewardKindWeights:
  item: 5
  secret: 4
  wealth: 4
  lore: 2
  renown: 2
  supplies: 1
  vigor: 1

# Magnitude of a fungible reward.
rewardTierWeights:
  minor: 1
  moderate: 3
  major: 3
  extreme: 1

# Chance the primary goal isn't actually there (revealed by a trial).
inviableChance: 0.15

# How many optional (known, secondary) goals an adventure has — keys are counts.
optionalCountWeights:
  '0': 6
  '1': 3
  '2': 1

# Magnitude of a fungible optional-goal reward (skewed smaller than the primary).
optionalTierWeights:
  minor: 4
  moderate: 2
  major: 1

# Per-won-trial chance a trial mints an unknown (unsought, discovered) goal.
unknownSpawnChance: 0.08

# Magnitude of a fungible unknown-goal reward — can skew large (a discovery worth more than the primary).
unknownTierWeights:
  minor: 1
  moderate: 2
  major: 3
  extreme: 2

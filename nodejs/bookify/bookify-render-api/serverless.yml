frameworkVersion: ^4.0.0
org: twindigital
service: bookify-render
useDotenv: true

stages:
  default:
    params:
      region: us-east-1
  dev:
    params:
      profile: ${env:DEV_AWS_PROFILE}
      region: us-east-1
  prod:
    params:
      region: us-east-1

custom:
  alerts:
    alarms:
      - functionErrors
      - functionThrottles
      - functionDuration
    definitions:
      functionErrors:
        nameTemplate: ${self:custom.nameTemplates.criticalSeverity}
        treatMissingData: notBreaching
      functionThrottles:
        treatMissingData: notBreaching
      functionDuration:
        treatMissingData: notBreaching
    nameTemplate: ${self:custom.nameTemplates.mediumSeverity}
    prefixTemplate: ''
    stages:
      - dev
      - prod
      - staging
    topics:
      alarm:
        topic: ${self:service}-${sls:stage}-alerts
        notifications:
          - protocol: email
            endpoint: techops@twindigital.io
  logLevel:
    dev: DEBUG
    prod: INFO
  metricsNamespace: Bookify
  nameTemplates:
    criticalSeverity: ${self:service}-${sls:stage}-$[functionName]-CRITICAL-$[metricName]
    lowSeverity: ${self:service}-${sls:stage}-$[functionName]-LOW-$[metricName]
    mediumSeverity: ${self:service}-${sls:stage}-$[functionName]-MEDIUM-$[metricName]
    securitySeverity: ${self:service}-${sls:stage}-$[functionName]-SECURITY-$[metricName]
  servicePascal: BookifyRender
  stagePascal: ${self:custom.stagesPascal.${sls:stage}, sls:stage}
  stagesPascal:
    dev: Dev
    prod: Prod
    staging: Staging

provider:
  architecture: x86_64
  environment:
    NODE_ENV: ${self:provider.stage}
    API_KEYS_TABLE: !Ref ApiKeysTable
    # Powertools configuration
    POWERTOOLS_SERVICE_NAME: ${self:service}
    POWERTOOLS_LOG_LEVEL: ${self:custom.logLevel.${self:provider.stage}, 'INFO'}
    POWERTOOLS_LOGGER_LOG_EVENT: false
    # Namespace groups all Bookify services; service name becomes a dimension for filtering
    POWERTOOLS_METRICS_NAMESPACE: ${self:custom.metricsNamespace}
  name: aws
  region: ${param:region}
  profile: ${param:profile, ''}
  runtime: nodejs24.x
  stage: ${opt:stage, 'dev'}
  # Enable X-Ray tracing for all Lambda functions
  tracing:
    lambda: true
  ecr:
    images:
      pandoc-image:
        path: ./
        file: docker/pandoc/Dockerfile
        buildArgs:
          PANDOC_VERSION: 3.8.3
          PANDOC_CHECKSUM: 'sha256:c224fab89f827d3623380ecb7c1078c163c769c849a14ac27e8d3bfbb914c9b4'
          NODE_ENV: production
  httpApi:
    authorizers:
      apiKeyAuthorizer:
        type: request
        functionName: authorizer
        enableSimpleResponses: true
        identitySource:
          - $request.header.Authorization

# we use tsdown for our own building
build:
  esbuild: false

package:
  patterns:
    - '!**/*'
    - package.json
    - 'dist/**/*.js'
    - 'dist/**/*.js.map'

functions:
  authorizer:
    handler: dist/functions/authorizer/authorizer.handler
    environment:
      API_KEYS_TABLE: !Ref ApiKeysTable
    alarms:
      - name: RevokedKeyUsage
        namespace: ${self:custom.metricsNamespace}
        nameTemplate: ${self:custom.nameTemplates.securitySeverity}
        description: Alert on revoked API key usage (security event)
        metric: AuthDeniedRevoked
        threshold: 0
        statistic: Sum
        period: 300 # 5 minutes
        evaluationPeriods: 1
        comparisonOperator: GreaterThanThreshold
        treatMissingData: notBreaching

  render-html:
    image:
      name: pandoc-image
      command:
        - dist/functions/render-html/render-html.handler
    events:
      - httpApi:
          path: /render/html
          method: post
          authorizer:
            name: apiKeyAuthorizer
    alarms:
      # SECURITY: Path traversal attempts
      - name: RenderPathTraversal
        namespace: ${self:custom.metricsNamespace}
        nameTemplate: ${self:custom.nameTemplates.securitySeverity}
        metric: RenderPathTraversalAttempt
        threshold: 0
        statistic: Sum
        period: 60
        evaluationPeriods: 1
        comparisonOperator: GreaterThanThreshold
        treatMissingData: notBreaching

      # ERROR RATE: Absolute count
      - name: RenderErrorRate
        namespace: ${self:custom.metricsNamespace}
        nameTemplate: ${self:custom.nameTemplates.criticalSeverity}
        metric: RenderError
        threshold: 10
        statistic: Sum
        period: 300
        evaluationPeriods: 2
        comparisonOperator: GreaterThanThreshold
        treatMissingData: notBreaching

      # INVALID REQUESTS: Client errors
      - name: InvalidRequestRate
        namespace: ${self:custom.metricsNamespace}
        nameTemplate: ${self:custom.nameTemplates.lowSeverity}
        metric: RenderInvalidRequest
        threshold: 20
        statistic: Sum
        period: 300
        evaluationPeriods: 2
        comparisonOperator: GreaterThanThreshold
        treatMissingData: notBreaching

      # SLOW RENDERS: Performance degradation
      - name: SlowRenders
        namespace: ${self:custom.metricsNamespace}
        metric: RenderDuration
        threshold: 3000
        statistic: Average
        period: 300
        evaluationPeriods: 3
        comparisonOperator: GreaterThanThreshold
        treatMissingData: notBreaching

  version:
    image:
      name: pandoc-image
      command:
        - dist/functions/version/version.handler
    events:
      - httpApi:
          path: /version
          method: get
    alarms:
      - name: functionErrors
        enabled: false
      - name: functionThrottles
        enabled: false
      - name: functionDuration
        enabled: false

resources:
  Resources:
    ApiKeysTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.servicePascal}${self:custom.stagePascal}ApiKeys
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: keyId
            AttributeType: S
          - AttributeName: userId
            AttributeType: S
        KeySchema:
          - AttributeName: keyId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: userId-index
            KeySchema:
              - AttributeName: userId
                KeyType: HASH
            Projection:
              ProjectionType: ALL

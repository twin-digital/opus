packages:
  - nodejs/*/*
  - tooling/scripts
  - tooling/renovate-tools
  # Not a package — a docker-compose Bedrock dev harness for the minecraft packs.
  - '!nodejs/minecraft/dev-bedrock-server'

catalog:
  '@aws-lambda-powertools/logger': ^2.30.0
  '@aws-lambda-powertools/metrics': ^2.30.0
  '@aws-lambda-powertools/parameters': ^2.30.0
  '@aws-lambda-powertools/tracer': ^2.30.0
  '@aws-sdk/client-bedrock-runtime': ^3.958.0
  '@aws-sdk/client-dynamodb': ^3.958.0
  ajv: ^8.17.1
  '@aws-sdk/client-s3': ^3.958.0
  '@aws-sdk/client-sns': ^3.958.0
  '@aws-sdk/client-ssm': ^3.958.0
  '@aws-sdk/lib-dynamodb': ^3.958.0
  '@eslint/js': ^10.0.0
  'aws-sdk-client-mock': ^4.1.0
  'aws-sdk-client-mock-vitest': ^7.0.1
  '@middy/core': ^7.0.0
  '@types/aws-lambda': ^8.10.159
  '@types/lodash-es': ^4.17.12
  '@types/node': 24.13.2
  chalk: ^5.6.2
  dotenv: ^17.2.3
  eslint: ^10.0.0
  eslint-config-prettier: ^10.1.5
  execa: ^9.6.1
  globals: ^17.0.0
  lodash-es: ^4.17.22
  prettier: ^3.5.3
  prettier-package-json: ^2.8.0
  serverless: 4.37.0
  ts-node: ^10.9.2
  tsdown: ^0.18.3
  typescript: ^6.0.0
  typescript-eslint: ^8.47.0
  vite: ^6.3.5
  vitest: ^4.0.12
  '@vitest/coverage-istanbul': 4.1.9
  yaml: ^2.8.2
  zod: ^4.4.3

# pnpm 11 removed `onlyBuiltDependencies`; the allowlist of deps permitted to run
# install scripts is now the `allowBuilds` map. `strictDepBuilds` defaults to true,
# so anything not listed here fails the install rather than silently skipping.
allowBuilds:
  '@julusian/midi': true
  audify: true
  esbuild: true
  hnswlib-node: true
  serverless: true

# pnpm 11 enables an install-time supply-chain gate (minimumReleaseAge, default 1 day):
# newly published versions won't resolve until they've matured. globby@16.2.1 landed in
# the lockfile (via #205) less than a day before this migration, so exclude that one
# version temporarily until it ages past the window.
minimumReleaseAgeExclude:
  - globby@16.2.1

peerDependencyRules:
  allowedVersions:
    # @mishieck/ink-titled-box@0.4.x still declares peer ink@^6, but it only uses ink's
    # stable Box/Text API and runs fine on ink 7 (refbash builds, type-checks, and tests
    # pass). Scoped to this edge so a genuine ink peer mismatch elsewhere still warns.
    '@mishieck/ink-titled-box>ink': '7'
    # These deps haven't widened their peer ranges to the toolchain versions the repo
    # standardizes on (TypeScript 6, ESLint 10); all build and lint clean against them.
    # Scoped per-edge so a genuinely incompatible peer elsewhere still warns.
    'tsdown>typescript': '6'
    'rolldown-plugin-dts>typescript': '6'
    '@mishieck/ink-titled-box>typescript': '6'
    'eslint-plugin-react>eslint': '10'

overrides:
  '@smithy/types': 4.15.0

packageExtensions:
  aws-sdk-client-mock:
    dependencies:
      '@smithy/types': 4.11.0
  '@aws-sdk/*':
    dependencies:
      '@smithy/types': 4.11.0
